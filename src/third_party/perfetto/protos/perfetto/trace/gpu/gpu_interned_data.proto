syntax = "proto2";

package perfetto.protos;

import public "protos/perfetto/trace/interned_data/interned_data.proto";
import "protos/perfetto/trace/gpu/gpu_render_stage_event.proto";

// GPU-specific extensions for InternedData. Field numbers are allocated
// from the perfetto_gpu range (1000-1099) in interned_data_extensions.json.
message GpuInternedData {
  extend InternedData {
    // Description of a compute kernel (name, demangled name, architecture).
    repeated InternedComputeKernel compute_kernels = 1000;

    // Names for ExtraComputeArg key fields.
    repeated InternedComputeArgName compute_arg_names = 1001;
  }
}
